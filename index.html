<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Ledger Pro - Task Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f1f5f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 15px; min-height: 95vh; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 15px; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .header h2 { font-size: 18px; color: var(--primary); margin: 0; }
        .header-btns { display: flex; gap: 10px; }
        .icon-btn { background: #e2e8f0; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .icon-btn:hover { background: #cbd5e1; }

        .search-bar { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }

        /* Task Card */
        .task-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .task-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #1e293b; }
        .task-desc { font-size: 12px; color: #64748b; margin-bottom: 10px; }
        .task-meta { display: flex; justify-content: space-between; align-items: center; }
        .balance-chip { padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        
        .action-btns { display: flex; gap: 5px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-view { background: #eff6ff; color: var(--primary); }
        .btn-edit { background: #fef9c3; color: #854d0e; }
        .btn-del { background: #fee2e2; color: var(--danger); }

        /* Statement Styles */
        .st-header { background: #f8fafc; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .st-header h3 { margin: 0; color: #1e293b; }
        .tran-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .tran-table th { background: #f1f5f9; padding: 10px; text-align: left; }
        .tran-table td { padding: 10px; border-bottom: 1px solid #eee; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 350px; padding: 20px; border-radius: 15px; }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .red { color: var(--danger); background: #fee2e2; }
        .green { color: var(--success); background: #dcfce7; }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboardSection">
        <div class="header">
            <h2>Personal Ledger Pro</h2>
            <div class="header-btns">
                <button class="icon-btn" onclick="location.reload()">🔄</button>
                <button class="icon-btn" onclick="showTrash()">🗑️ Trash</button>
            </div>
        </div>
        
        <input type="text" id="searchInput" class="search-bar" placeholder="Search tasks..." onkeyup="renderDashboard()">
        <button class="btn-main" onclick="openTaskModal()">+ New Task</button>
        <div id="taskList"></div>
    </div>

    <div id="statementSection" style="display:none">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
            <button onclick="closeStatement()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer">← Back</button>
            <button class="btn-sm green" style="flex:none; padding:8px 15px" onclick="openEntryModal()">+ Add Entry</button>
        </div>

        <div class="st-header">
            <h3 id="stTaskName">Task Name</h3>
            <p id="stTaskDesc" style="font-size:12px; color:#666"></p>
            <div id="stFinalBalance" class="balance-chip">Balance: 0 AED</div>
        </div>

        <table class="tran-table">
            <thead>
                <tr><th>Date</th><th>Type</th><th>Amount</th></tr>
            </thead>
            <tbody id="stBody"></tbody>
        </table>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:#25d366" onclick="shareWhatsApp()">WhatsApp PDF</button>
            <button class="btn-main" style="background:#000" onclick="downloadPDF()">PDF</button>
        </div>
    </div>

    <div id="trashSection" style="display:none">
        <button onclick="closeTrash()" style="background:none; border:none; color:var(--primary); font-weight:bold; margin-bottom:15px">← Back to Home</button>
        <div id="trashList"></div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h3 id="taskModalTitle">New Task</h3>
        <input type="hidden" id="editTaskId">
        <input type="text" id="tName" placeholder="Task Name (e.g. Building Project)">
        <textarea id="tDesc" placeholder="Description"></textarea>
        <button class="btn-main" onclick="saveTask()">Save Task</button>
        <button class="btn-main" style="background:#eee; color:#333" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="entryModal" class="modal">
    <div class="modal-content">
        <h3>Add New Entry</h3>
        <select id="eType">
            <option value="Received">Received Money</option>
            <option value="Paid">Paid Money</option>
        </select>
        <input type="number" id="eAmount" placeholder="Amount in AED">
        <input type="date" id="eDate">
        <textarea id="eNote" placeholder="Note / Reason"></textarea>
        <button class="btn-main" style="background:var(--success)" onclick="saveEntry()">Save Entry</button>
        <button class="btn-main" style="background:#eee; color:#333" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let tasks = JSON.parse(localStorage.getItem('pro_ledger_tasks')) || [];
    let trash = JSON.parse(localStorage.getItem('pro_ledger_trash')) || [];
    let activeTaskId = null;

    // --- Core Functions ---

    function renderDashboard() {
        const list = document.getElementById('taskList');
        const query = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = "";

        tasks.forEach((task, index) => {
            if (task.name.toLowerCase().includes(query)) {
                const bal = calculateBalance(task.entries);
                list.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <h3>${task.name}</h3>
                            <div class="task-desc">${task.desc}</div>
                        </div>
                        <div class="task-meta">
                            <span class="balance-chip ${bal >= 0 ? 'green' : 'red'}">
                                ${bal} AED
                            </span>
                            <span style="font-size:11px; color:#999">${task.entries.length} Entries</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn-sm btn-view" onclick="viewTask(${index})">View Statement</button>
                            <button class="btn-sm btn-edit" onclick="editTask(${index})">Edit</button>
                            <button class="btn-sm btn-del" onclick="deleteTask(${index})">Delete</button>
                        </div>
                    </div>`;
            }
        });
    }

    function calculateBalance(entries) {
        return entries.reduce((acc, curr) => {
            return acc + (curr.type === "Received" ? 1 : -1) * parseFloat(curr.amount);
        }, 0);
    }

    // --- Task Logic ---

    function openTaskModal() {
        document.getElementById('taskModalTitle').innerText = "New Task";
        document.getElementById('editTaskId').value = "";
        document.getElementById('tName').value = "";
        document.getElementById('tDesc').value = "";
        document.getElementById('taskModal').style.display = 'flex';
    }

    function saveTask() {
        const name = document.getElementById('tName').value.trim();
        const desc = document.getElementById('tDesc').value.trim();
        const editId = document.getElementById('editTaskId').value;

        if (!name) return alert("Task Name is required");

        if (editId !== "") {
            tasks[editId].name = name;
            tasks[editId].desc = desc;
        } else {
            tasks.push({ name, desc, entries: [] });
        }

        saveToLocalStorage();
        closeModal();
        renderDashboard();
    }

    function editTask(index) {
        openTaskModal();
        document.getElementById('taskModalTitle').innerText = "Edit Task";
        document.getElementById('editTaskId').value = index;
        document.getElementById('tName').value = tasks[index].name;
        document.getElementById('tDesc').value = tasks[index].desc;
    }

    function deleteTask(index) {
        if(confirm("Move to trash?")) {
            trash.push(tasks[index]);
            tasks.splice(index, 1);
            saveToLocalStorage();
            renderDashboard();
        }
    }

    // --- Entry Logic ---

    function viewTask(index) {
        activeTaskId = index;
        const task = tasks[index];
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('statementSection').style.display = 'block';
        document.getElementById('stTaskName').innerText = task.name;
        document.getElementById('stTaskDesc').innerText = task.desc;
        
        renderEntries();
    }

    function renderEntries() {
        const body = document.getElementById('stBody');
        const task = tasks[activeTaskId];
        body.innerHTML = "";
        
        task.entries.forEach(e => {
            body.innerHTML += `
                <tr>
                    <td>${e.date}</td>
                    <td class="${e.type === 'Paid' ? 'red' : 'green'}" style="background:transparent; font-weight:bold">${e.type}</td>
                    <td>${e.amount} AED <br><small style="color:#666">${e.note}</small></td>
                </tr>`;
        });

        const bal = calculateBalance(task.entries);
        const balEl = document.getElementById('stFinalBalance');
        balEl.innerText = `Total Balance: ${bal} AED`;
        balEl.className = `balance-chip ${bal >= 0 ? 'green' : 'red'}`;
    }

    function openEntryModal() {
        document.getElementById('eAmount').value = "";
        document.getElementById('eNote').value = "";
        document.getElementById('eDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('entryModal').style.display = 'flex';
    }

    function saveEntry() {
        const type = document.getElementById('eType').value;
        const amount = document.getElementById('eAmount').value;
        const date = document.getElementById('eDate').value;
        const note = document.getElementById('eNote').value || "-";

        if (!amount || !date) return alert("Fill amount and date");

        tasks[activeTaskId].entries.push({ type, amount, date, note });
        saveToLocalStorage();
        closeModal();
        renderEntries();
    }

    // --- PDF & WhatsApp ---

    function generatePDFBlob() {
        const doc = new jsPDF();
        const task = tasks[activeTaskId];
        const bal = calculateBalance(task.entries);

        doc.setFontSize(18);
        doc.text("Task Statement", 14, 20);
        doc.setFontSize(12);
        doc.text(`Task: ${task.name}`, 14, 30);
        doc.text(`Description: ${task.desc}`, 14, 37);
        doc.text(`Final Balance: ${bal} AED`, 14, 44);

        const rows = task.entries.map(e => [e.date, e.type, `${e.amount} AED`, e.note]);
        doc.autoTable({
            head: [['Date', 'Type', 'Amount', 'Note']],
            body: rows,
            startY: 50,
        });

        return doc;
    }

    function downloadPDF() {
        const doc = generatePDFBlob();
        doc.save(`${tasks[activeTaskId].name}_Statement.pdf`);
    }

    function shareWhatsApp() {
        const task = tasks[activeTaskId];
        const bal = calculateBalance(task.entries);
        let text = `*Statement: ${task.name}*\nBalance: ${bal} AED\n\n`;
        task.entries.forEach(e => {
            text += `📅 ${e.date} | ${e.type === 'Paid' ? '🔴' : '🟢'} ${e.amount} AED\nNote: ${e.note}\n\n`;
        });
        
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }

    // --- Trash & Restore ---

    function showTrash() {
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('trashSection').style.display = 'block';
        const list = document.getElementById('trashList');
        list.innerHTML = trash.length === 0 ? "<p style='text-align:center'>Trash is empty</p>" : "";

        trash.forEach((item, index) => {
            list.innerHTML += `
                <div class="task-card">
                    <h3>${item.name}</h3>
                    <button class="btn-main" style="background:var(--success)" onclick="restoreTask(${index})">Restore</button>
                </div>`;
        });
    }

    function restoreTask(index) {
        tasks.push(trash[index]);
        trash.splice(index, 1);
        saveToLocalStorage();
        showTrash();
    }

    // --- Helpers ---

    function saveToLocalStorage() {
        localStorage.setItem('pro_ledger_tasks', JSON.stringify(tasks));
        localStorage.setItem('pro_ledger_trash', JSON.stringify(trash));
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function closeStatement() {
        document.getElementById('statementSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        renderDashboard();
    }

    function closeTrash() {
        document.getElementById('trashSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        renderDashboard();
    }

    renderDashboard();
</script>
</body>
</html>
